# ABOUTME: GitHub Actions workflow to validate configurations on PRs.
# ABOUTME: Runs Python validators, Node.js validators, shellcheck, and linting.

name: Validate Configurations

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-python:
    name: Python Validators
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install tiktoken

      - name: Run validation script
        run: python scripts/validate.py .

      - name: Check token counts
        run: python scripts/token-count.py .

  validate-node:
    name: Node.js Validators
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run test suite
        run: node tests/run-all.js

  validate-scripts:
    name: Shell Script Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate shell scripts
        run: |
          echo "Running shellcheck..."
          find . -name "*.sh" -not -path "./node_modules/*" -not -path "./.git/*" -print0 | xargs -0 shellcheck

  validate-json:
    name: JSON Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate all JSON files
        run: |
          echo "Validating JSON files..."
          exit_code=0
          while IFS= read -r -d '' file; do
            if ! python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$file" 2>/dev/null; then
              echo "Invalid JSON: $file"
              exit_code=1
            fi
          done < <(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -print0)
          if [ "$exit_code" -eq 0 ]; then
            echo "All JSON files are valid"
          fi
          exit $exit_code

  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for broken links
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check.json'

  yaml-lint:
    name: Lint YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          if find . -name "*.yml" -o -name "*.yaml" | grep -q .; then
            yamllint -d relaxed .
          fi
